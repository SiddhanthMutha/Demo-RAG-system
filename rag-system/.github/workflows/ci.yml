name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testragdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint — black
        run: black --check src/ tests/

      - name: Lint — flake8
        run: flake8 src/ tests/ --max-line-length=100

      - name: Lint — mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Type checking is advisory

      - name: Run unit tests
        env:
          OPENAI_API_KEY: sk-placeholder
          PINECONE_API_KEY: placeholder
          DATABASE_URL: postgresql+asyncpg://raguser:testpassword@localhost:5432/testragdb
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

  evaluation:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
        run: python scripts/run_evaluation.py
        continue-on-error: true  # Don't block PRs if evaluation keys aren't set

      - name: Comment evaluation results on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('evaluation_results.md')) {
              console.log('No evaluation results file found, skipping comment.');
              return;
            }
            const results = fs.readFileSync('evaluation_results.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📊 RAG Evaluation Results\n\n' + results
            });
