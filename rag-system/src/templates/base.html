<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG System{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #f5f1e8;
            --surface: #fffdf8;
            --surface-strong: #f2ead8;
            --border: #d4c7ad;
            --text: #1f1a14;
            --muted: #675a49;
            --accent: #7b4b2a;
            --accent-soft: #efe0ce;
            --danger: #8b2f2f;
            --ok: #2f6b46;
            --shadow: 0 10px 30px rgba(61, 42, 23, 0.08);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #fff7e9 0, transparent 30%),
                linear-gradient(180deg, #f4ead8 0%, var(--bg) 100%);
        }

        a { color: inherit; }
        .shell {
            max-width: 1120px;
            margin: 0 auto;
            padding: 24px;
        }
        .masthead {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            align-items: center;
            margin-bottom: 24px;
            padding: 20px 24px;
            background: rgba(255, 253, 248, 0.92);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        .brand h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav a {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .layout {
            display: grid;
            gap: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 20px;
        }
        .card h2, .card h3 {
            margin-top: 0;
        }
        .grid {
            display: grid;
            gap: 16px;
        }
        .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        label {
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 11px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font: inherit;
            background: #fffefa;
            color: var(--text);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            cursor: pointer;
            background: var(--accent);
            color: #fff9f1;
            border-color: var(--accent);
            font-weight: 600;
        }
        button.secondary {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }
        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        .muted {
            color: var(--muted);
        }
        .stream-box {
            min-height: 180px;
            white-space: pre-wrap;
            line-height: 1.55;
            padding: 14px;
            background: #fffaf1;
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        .pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.85rem;
            background: var(--accent-soft);
            color: var(--accent);
        }
        .metric-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }
        .metric-card {
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, #fffef9 0%, #f8f0e1 100%);
        }
        .metric-card strong {
            display: block;
            font-size: 1.6rem;
            margin-bottom: 6px;
            color: var(--accent);
        }
        .list, .table {
            display: grid;
            gap: 12px;
        }
        .table-row {
            display: grid;
            gap: 8px;
            grid-template-columns: 1.2fr 2fr 0.8fr 0.9fr 0.9fr;
            align-items: center;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fffdf9;
        }
        .table-row.header {
            font-weight: 700;
            background: var(--surface-strong);
        }
        .source-item, .history-item, .result-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            background: #fffdf9;
        }
        .status-ok { color: var(--ok); }
        .status-danger { color: var(--danger); }
        .split {
            display: grid;
            gap: 20px;
            grid-template-columns: 1.15fr 0.85fr;
        }
        .inline-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        .empty-state {
            padding: 18px;
            border: 1px dashed var(--border);
            border-radius: 14px;
            color: var(--muted);
            background: rgba(255, 251, 242, 0.75);
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-block;
        }

        @media (max-width: 860px) {
            .masthead,
            .split,
            .grid.two,
            .grid.three,
            .table-row {
                grid-template-columns: 1fr;
            }
            .shell {
                padding: 16px;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <header class="masthead">
            <div class="brand">
                <h1>RAG System</h1>
                <p>Query, ingest, inspect documents, and run full-suite evaluations.</p>
            </div>
            <nav class="nav">
                <a href="/web/query">Query</a>
                <a href="/web/ingest">Ingestion</a>
                <a href="/web/documents">Documents</a>
                <a href="/web/eval">Evaluation</a>
            </nav>
        </header>

        <main class="layout">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function escapeHtml(value) {
            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function renderSources(container, sources) {
            if (!sources || sources.length === 0) {
                container.innerHTML = '<div class="empty-state">No sources were returned for this query.</div>';
                return;
            }

            container.innerHTML = sources.map(function(source, index) {
                return `
                    <div class="source-item">
                        <strong>${index + 1}. ${escapeHtml(source.document_source || "Unknown source")}</strong>
                        <div class="muted">score: ${Number(source.score || 0).toFixed(4)}</div>
                        <p>${escapeHtml(source.content || "")}</p>
                    </div>
                `;
            }).join("");
        }

        function initQueryStreams(root) {
            var scope = root || document;
            scope.querySelectorAll("[data-query-stream]").forEach(function(node) {
                if (node.dataset.started === "true") {
                    return;
                }
                node.dataset.started = "true";

                var streamUrl = node.dataset.streamUrl;
                var output = node.querySelector("[data-role='output']");
                var sources = node.querySelector("[data-role='sources']");
                var status = node.querySelector("[data-role='status']");
                var eventSource = new EventSource(streamUrl);

                output.textContent = "";
                sources.innerHTML = '<div class="empty-state">Waiting for sources...</div>';
                status.textContent = "Streaming answer...";

                eventSource.onmessage = function(event) {
                    var payload = JSON.parse(event.data);
                    if (payload.type === "token") {
                        output.textContent += payload.data;
                    } else if (payload.type === "sources") {
                        renderSources(sources, payload.data);
                    } else if (payload.type === "done") {
                        status.textContent = "Complete";
                        eventSource.close();
                    } else if (payload.type === "error") {
                        status.textContent = "Error";
                        output.textContent += "\n\n" + payload.data;
                        eventSource.close();
                    }
                };

                eventSource.onerror = function() {
                    status.textContent = "Connection interrupted";
                    eventSource.close();
                };
            });
        }

        document.addEventListener("DOMContentLoaded", function() {
            initQueryStreams(document);
        });

        document.body.addEventListener("htmx:afterSwap", function(event) {
            initQueryStreams(event.target);
        });
    </script>
</body>
</html>
