{% extends "base.html" %}
{% block title %}Documents | RAG System{% endblock %}
{% block content %}
<section class="card">
    <div class="inline-meta">
        <span class="pill">Read-only inventory</span>
        <span class="pill">Newest first</span>
    </div>
    <h2>Documents</h2>
    <p class="muted">A simple inventory of ingested documents and how many chunks each produced.</p>
    <div
        id="documents-table"
        hx-get="/web/documents/table"
        hx-trigger="load"
        hx-swap="innerHTML"
    >
        <div class="empty-state">Loading documents...</div>
    </div>
</section>
{% endblock %}
